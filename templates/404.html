<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 – Page Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=VT323');

        :root {
            --light-grey: #e0e2f4;
            --grey: #aaaaaa;
            --blue: #0414a7;
            --base-font-size: 20px;
            --font-stack: 'VT323', monospace;
        }

        body {
            background: var(--blue);
            color: var(--light-grey);
            font-family: var(--font-stack);
            font-size: var(--base-font-size);
            line-height: 1.25rem;
            margin: 0;
        }

        h1, h2, h3, h4, p, a {
            color: var(--light-grey);
        }

        h1 { font-size: 2.75rem; line-height: 1.05em; }
        h2 { font-size: 2.25rem; line-height: 1.25em; }
        h3 { font-size: 1.5rem; line-height: 1.25em; }
        h4 { font-size: 1.125rem; line-height: 1.22em; }

        .container {
            width: 90%;
            max-width: 640px;
            margin: 0 auto;
        }

        .bsod {
            padding-top: 10%;
            text-align: center;
        }

        .neg {
            color: var(--blue);
            margin-bottom: 40px;
        }

        .neg .bg {
            background: var(--grey);
            padding: 0 15px 2px 13px;
        }

        .nav {
            margin-top: 35px;
        }

        .nav .link {
            text-decoration: none;
            padding: 2px 10px;
            color: var(--light-grey);
        }

        .nav .link:hover,
        .nav .link:focus {
            background: var(--grey);
            color: var(--blue);
        }
    </style>
</head>
<body>

<main class="bsod container">
    <h1 class="neg"><span class="bg">Error - 404</span></h1>

    <p>An error has occurred.</p>
    <p>
        * Return to our homepage.<br>
        * Send us an e-mail about this error and try later.
    </p>

    <nav class="nav">
        <a href="#" class="link">index</a>
        &nbsp;|&nbsp;
        <a href="#" class="link">webmaster</a>
    </nav>
</main>

</body>
</html>
